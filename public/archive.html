<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTF Daily — Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="modulepreload" href="../js/config.js">
  <link rel="modulepreload" href="../js/auth.js">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div id="page-loader">
  <div class="spinner"></div>
</div>
<div class="ambient-orb"></div>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar__logo">
      <a href="./dashboard.html" class="logo-mark">
        <div class="logo-icon">&gt;_</div>
        CTFArena
      </a>
    </div>
    <span class="sidebar__section-label">Navigate</span>
    <nav class="sidebar__nav">
      <a href="./dashboard.html"><span class="nav-icon">⚡</span> Dashboard</a>
      <a href="./archive.html" class="active"><span class="nav-icon">📁</span> Archive</a>
      <a href="./leaderboard.html"><span class="nav-icon">🏆</span> Leaderboard</a>
    </nav>
    <span class="sidebar__section-label">Account</span>
    <nav class="sidebar__nav">
      <a href="./profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">…</div>
          <div class="user-role" id="user-role">student</div>
        </div>
      </div>
      <button class="btn btn--ghost btn--sm btn--full" id="btn-logout" style="margin-top:0.75rem">Sign Out</button>
    </div>
  </aside>

  <div>
    <header class="topbar">
      <h1 class="topbar__title">Archive</h1>
      <span class="topbar__tag">Past Challenges</span>
      <div class="topbar__right">
        <div style="display:flex;gap:0.5rem;border-right:1px solid var(--clr-border);padding-right:1rem;margin-right:1rem">
          <button class="btn btn--ghost btn--sm" id="filter-all" data-filter="all">All</button>
          <button class="btn btn--ghost btn--sm" id="filter-unsolved" data-filter="unsolved">Unsolved</button>
          <button class="btn btn--ghost btn--sm" id="filter-solved" data-filter="solved">Solved</button>
        </div>
        <input class="form-input" type="search" id="search-input" placeholder="Search challenges…" style="width:220px;padding:.45rem .875rem;font-size:.82rem">
        <select class="form-select" id="filter-category" style="width:140px;padding:.45rem .875rem;font-size:.82rem">
          <option value="">All Categories</option>
          <option value="Web">Web</option>
          <option value="Crypto">Crypto</option>
          <option value="Forensics">Forensics</option>
          <option value="Pwn">Pwn</option>
          <option value="Rev">Rev</option>
          <option value="OSINT">OSINT</option>
          <option value="Misc">Misc</option>
        </select>
      </div>
    </header>

    <main class="main-content">
      <div id="archive-grid" class="grid-auto" data-stagger>
        <div class="empty-state" style="grid-column:1/-1">
          <div class="spinner" style="margin:0 auto 1rem;width:32px;height:32px;border-width:3px;border-top-color:var(--clr-primary)"></div>
          Loading archive…
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Challenge Modal (reused) -->
<div class="modal-overlay" id="challenge-modal">
  <div class="modal">
    <div class="modal__header">
      <div>
        <div id="modal-category" style="margin-bottom:.5rem"></div>
        <div class="modal__title" id="modal-title">Challenge</div>
      </div>
      <button class="modal__close" id="modal-close">✕</button>
    </div>
    <p id="modal-desc" style="color:var(--clr-text-muted);font-size:.9rem;line-height:1.6;margin-bottom:1.25rem"></p>
    <div style="display:flex;gap:1rem;margin-bottom:1.25rem">
      <div>
        <div style="font-family:var(--font-mono);font-size:.65rem;color:var(--clr-text-muted);text-transform:uppercase;letter-spacing:.1em">Points</div>
        <div id="modal-points" style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--clr-primary)">—</div>
      </div>
      <div>
        <div style="font-family:var(--font-mono);font-size:.65rem;color:var(--clr-text-muted);text-transform:uppercase;letter-spacing:.1em">Solves</div>
        <div id="modal-solves" style="font-family:var(--font-display);font-size:1.5rem;font-weight:800">—</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Submit Flag</label>
      <div style="display:flex;gap:.75rem;position:relative">
        <div style="position:relative;flex:1">
          <input class="form-input" type="text" id="flag-input" placeholder="CTF{...}" autocomplete="off" spellcheck="false">
          <div class="rate-limit-bar" id="rate-limit-bar"></div>
        </div>
        <button class="btn btn--primary" id="btn-submit-flag">Submit</button>
      </div>
    </div>
    <div id="flag-result" style="display:none;padding:.6rem .875rem;border-radius:6px;font-family:var(--font-mono);font-size:.82rem;margin-top:.5rem"></div>
  </div>
</div>

<script type="module">
  import { requireAuth, logout }  from "./js/auth.js";
  import { getArchivedChallenges, submitFlag } from "./js/db.js";
  import { categoryBadge, showToast, formatDate, setupLogoutConfirmation, animateCounter } from "./js/ui.js";

  let currentUser, currentProfile, allChallenges = [], activeChallengeId = null;
//   let lastSubmit = 0;
  let solvedFilter = "all"; // "all", "solved", "unsolved"

  try {
    ({ user: currentUser, profile: currentProfile } = await requireAuth("any"));
    document.getElementById("page-loader").classList.add("hidden");
  } catch { /* redirected */ }

  document.getElementById("user-name").textContent   = currentProfile.displayName;
  document.getElementById("user-role").textContent   = currentProfile.role;
  document.getElementById("user-avatar").textContent = currentProfile.displayName[0].toUpperCase();

  allChallenges = await getArchivedChallenges();
  renderGrid(allChallenges);

  function renderGrid(challenges) {
    const grid = document.getElementById("archive-grid");
    if (!challenges.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state__icon">📂</div>
        <div class="empty-state__title">No challenges found</div>
        <p>Try a different filter.</p>
      </div>`;
      return;
    }
    grid.innerHTML = challenges.map(c => {
      const solved = (currentProfile.solves || []).includes(c.id);
      return `
        <div class="challenge-card ${solved ? "solved" : ""}" data-id="${c.id}">
          <div class="challenge-card__header">
            ${categoryBadge(c.category)}
            <div class="challenge-card__points">${c.currentPoints} pts</div>
          </div>
          <div class="challenge-card__title">${c.title}</div>
          <p class="challenge-card__desc">${c.description}</p>
          <div class="challenge-card__footer">
            <span style="font-family:var(--font-mono);font-size:.72rem">${formatDate(c.unlockDate)}</span>
            <span style="font-family:var(--font-mono);font-size:.72rem">👥 ${c.solvesCount}</span>
          </div>
        </div>`;
    }).join("");

    grid.querySelectorAll(".challenge-card").forEach(card => {
      card.addEventListener("click", () => openModal(card.dataset.id));
    });
  }

  // ── Filter & Search ──
  function applyFilters() {
    const q   = document.getElementById("search-input").value.toLowerCase();
    const cat = document.getElementById("filter-category").value;
    renderGrid(allChallenges.filter(c => {
      const solved = (currentProfile.solves || []).includes(c.id);
      const matchesCategory = !cat || c.category === cat;
      const matchesSearch = !q || c.title.toLowerCase().includes(q) || c.description.toLowerCase().includes(q);
      const matchesSolvedFilter = 
        solvedFilter === "all" ||
        (solvedFilter === "solved" && solved) ||
        (solvedFilter === "unsolved" && !solved);
      return matchesCategory && matchesSearch && matchesSolvedFilter;
    }));
  }

  // ── Solved/Unsolved Filter Toggle ──
  ["all", "unsolved", "solved"].forEach(filter => {
    document.getElementById(`filter-${filter}`).addEventListener("click", () => {
      document.querySelectorAll("[id^='filter-'][data-filter]").forEach(btn => {
        btn.classList.remove("active");
      });
      document.getElementById(`filter-${filter}`).classList.add("active");
      solvedFilter = filter;
      applyFilters();
    });
  });
  // Set "all" as active by default
  document.getElementById("filter-all").classList.add("active");

  document.getElementById("search-input").addEventListener("input", applyFilters);
  document.getElementById("filter-category").addEventListener("change", applyFilters);

  // ── Modal ──
  function openModal(id) {
    const c = allChallenges.find(x => x.id === id);
    if (!c) return;
    activeChallengeId = id;
    document.getElementById("modal-title").textContent  = c.title;
    document.getElementById("modal-desc").textContent   = c.description;
    document.getElementById("modal-points").textContent = c.currentPoints;
    document.getElementById("modal-solves").textContent = c.solvesCount;
    document.getElementById("modal-category").innerHTML = categoryBadge(c.category);
    document.getElementById("flag-result").style.display = "none";
    document.getElementById("flag-input").value = "";
    document.getElementById("challenge-modal").classList.add("open");
    setTimeout(() => document.getElementById("flag-input").focus(), 300);
  }

  document.getElementById("modal-close").addEventListener("click", () => {
    document.getElementById("challenge-modal").classList.remove("open");
  });

  document.getElementById("challenge-modal").addEventListener("click", e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove("open");
  });

  // ── Escape key to close modal ──
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      const modal = document.getElementById("challenge-modal");
      if (modal.classList.contains("open")) {
        modal.classList.remove("open");
      }
    }
  });

  // ── Flag Submit ──
  let lastSubmit = 0;
  document.getElementById("btn-submit-flag").addEventListener("click", async () => {
    if (!activeChallengeId) return;
    const now = Date.now();
    if (now - lastSubmit < 5000) {
      const sec = Math.ceil((5000 - (now - lastSubmit)) / 1000);
      return showToast(`Rate limited — wait ${sec}s`, "error");
    }
    lastSubmit = now;
    const rawFlag = document.getElementById("flag-input").value.trim();
    if (!rawFlag) return showToast("Enter a flag.", "info");

    const btn = document.getElementById("btn-submit-flag");
    const flagInput = document.getElementById("flag-input");
    const rateLimitBar = document.getElementById("rate-limit-bar");
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 🔒';
    const result = await submitFlag(currentUser.uid, activeChallengeId, rawFlag);
    btn.disabled = false;
    btn.textContent = "Submit";

    // Start rate limit bar
    rateLimitBar.classList.add("active");
    setTimeout(() => rateLimitBar.classList.remove("active"), 5000);

    const el = document.getElementById("flag-result");
    el.style.display = "block";
    if (result.success) {
      el.style.cssText = "display:block;background:#00ff9d15;color:var(--clr-primary);border:1px solid #00ff9d40;padding:.6rem .875rem;border-radius:6px;font-family:var(--font-mono);font-size:.82rem;margin-top:.5rem";
      el.textContent = `✓ ${result.message}`;
      showToast(result.message, "success");
      flagInput.value = "";
      
      // Flash animation on challenge card
      const card = document.querySelector(`[data-id="${activeChallengeId}"]`);
      if (card && !card.classList.contains("solved")) {
        card.classList.add("flash");
        setTimeout(() => card.classList.add("solved"), 600);
      }
      
      // Check for streak milestones
      const newStreak = (currentProfile.streak || 0) + 1;
      if ([3, 7, 14, 30].includes(newStreak)) {
        showToast(`🔥 ${newStreak}-day streak! You're on fire.`, "success");
      }
    } else {
      el.style.cssText = "display:block;background:#ef444415;color:#fca5a5;border:1px solid #ef444440;padding:.6rem .875rem;border-radius:6px;font-family:var(--font-mono);font-size:.82rem;margin-top:.5rem";
      el.textContent = `✕ ${result.message}`;
      showToast(result.message, "error");
      
      // Shake animation on input
      flagInput.classList.add("shake");
      setTimeout(() => flagInput.classList.remove("shake"), 400);
    }
  });

  // ── Enter key to submit flag ──
  document.getElementById("flag-input")?.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      e.preventDefault();
      document.getElementById("btn-submit-flag").click();
    }
  });

  setupLogoutConfirmation(document.getElementById("btn-logout"), logout);
</script>
</body>
</html>
