<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTF Daily — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="modulepreload" href="./js/config.js">
  <link rel="modulepreload" href="./js/auth.js">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div id="page-loader">
  <div class="spinner"></div>
</div>
<div class="app-shell">

  <aside class="sidebar">
    <div class="sidebar__logo">
      <a href="./dashboard.html" class="logo-mark">
        <div class="logo-icon">&gt;_</div>
        CTFArena
      </a>
    </div>
    <span class="sidebar__section-label">Navigate</span>
    <nav class="sidebar__nav">
      <a href="./dashboard.html"><span class="nav-icon">⚡</span> Dashboard</a>
      <a href="./archive.html"><span class="nav-icon">📁</span> Archive</a>
      <a href="./leaderboard.html" class="active"><span class="nav-icon">🏆</span> Leaderboard</a>
    </nav>
    <span class="sidebar__section-label">Account</span>
    <nav class="sidebar__nav">
      <a href="./profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">…</div>
          <div class="user-role">student</div>
        </div>
      </div>
      <button class="btn btn--ghost btn--sm btn--full" id="btn-logout" style="margin-top:.75rem">Sign Out</button>
    </div>
  </aside>

  <div>
    <header class="topbar">
      <h1 class="topbar__title">Leaderboard</h1>
      <span class="topbar__tag">Global Rankings</span>
      <div class="topbar__right">
        <span class="live-indicator">Live</span>
      </div>
    </header>

    <main class="main-content">
      <!-- Podium top 3 -->
      <div id="podium" style="display:flex;gap:1rem;margin-bottom:1.5rem;justify-content:center;align-items:flex-end" data-stagger></div>

      <!-- Full table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:60px">Rank</th>
              <th>Handle</th>
              <th>Score</th>
              <th>Solves</th>
              <th>Last Solve</th>
              <th>Streak</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body">
            <tr>
              <td colspan="6" style="text-align:center;padding:2rem;color:var(--clr-text-muted)">
                <span class="spinner" style="display:inline-block;width:20px;height:20px;border-width:2px;border-top-color:var(--clr-primary)"></span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script type="module">
  import { requireAuth, logout } from "./js/auth.js";
  import { getLeaderboard }      from "./js/db.js";
  import { formatDate, setupLogoutConfirmation }          from "./js/ui.js";

  let currentUser, currentProfile;

  try {
    ({ user: currentUser, profile: currentProfile } = await requireAuth("any"));
    document.getElementById("page-loader").classList.add("hidden");
  } catch { /* redirected */ }

  document.getElementById("user-name").textContent   = currentProfile.displayName;
  document.getElementById("user-avatar").textContent = currentProfile.displayName[0].toUpperCase();

  const board = await getLeaderboard(50);

  // ── Podium (top 3) ──
  const podium = document.getElementById("podium");
  
  // Order for display: 2nd place, 1st place, 3rd place (staggered heights)
  const podiumOrder = [
    { idx: 1, barClass: "podium__bar-2", heightClass: "silver", heightPercent: 60 },
    { idx: 0, barClass: "podium__bar-1", heightClass: "gold", heightPercent: 80 },
    { idx: 2, barClass: "podium__bar-3", heightClass: "bronze", heightPercent: 40 },
  ];
  
  const heights = ["140px", "110px", "90px"];
  const rings = ["#fbbf24", "#94a3b8", "#f59e0b"];
  const medals = ["🥇", "🥈", "🥉"];
  
  podiumOrder.forEach(place => {
    const u = board[place.idx];
    if (!u) return;
    
    const div = document.createElement("div");
    div.className = `podium__bar ${place.barClass}`;
    
    div.innerHTML = `
      <div class="podium__avatar" style="border-color:${rings[place.idx]}">${u.displayName[0].toUpperCase()}</div>
      <div style="width:100%;text-align:center;margin-bottom:0.5rem">
        <div style="font-family:var(--font-display);font-weight:700;font-size:0.95rem;color:var(--clr-text)">${u.displayName}</div>
        <div style="font-family:var(--font-mono);font-size:1.1rem;font-weight:700;color:${rings[place.idx]};margin-top:0.2rem">${u.score.toLocaleString()}</div>
        <div style="font-size:0.75rem;color:var(--clr-text-muted);margin-top:0.25rem">${medals[place.idx]}</div>
      </div>
      <div class="podium__height ${place.heightClass}" style="height:${heights[place.idx]};"></div>
    `;
    
    podium.appendChild(div);
  });

  // ── Table ──
  const tbody = document.getElementById("leaderboard-body");
  let tableRows = board.map((u, i) => {
    const isMe = u.id === currentUser.uid;
    const rankClass = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
    return `
      <tr class="${isMe ? "highlighted" : ""}">
        <td><span class="rank-badge ${rankClass}">${u.rank}</span></td>
        <td>
          <span style="font-weight:${isMe ? 600 : 400}">${u.displayName}</span>
          ${isMe ? `<span style="font-family:var(--font-mono);font-size:.65rem;color:var(--clr-primary);margin-left:.4rem">you</span>` : ""}
        </td>
        <td class="mono" style="color:var(--clr-primary)">${u.score.toLocaleString()}</td>
        <td class="mono">${(u.solves || []).length}</td>
        <td class="mono">${formatDate(u.lastSolveAt)}</td>
        <td class="mono">🔥 ${u.streak || 0}</td>
      </tr>`;
  }).join("");

  // If current user is outside top 10, add a separator and their row
  const myRankEntry = board.find(u => u.id === currentUser.uid);
  if (myRankEntry && myRankEntry.rank > 10) {
    tableRows += `
      <tr style="border-top: 2px dashed var(--clr-border); height: 20px; pointer-events: none;">
        <td colspan="6" style="text-align: center; color: var(--clr-text-muted); font-size: 0.75rem; padding: 0.6rem;">
          ↓ Your Rank
        </td>
      </tr>
      <tr class="highlighted">
        <td><span class="rank-badge">${myRankEntry.rank}</span></td>
        <td>
          <span style="font-weight: 600;">${myRankEntry.displayName}</span>
          <span style="font-family:var(--font-mono);font-size:.65rem;color:var(--clr-primary);margin-left:.4rem">you</span>
        </td>
        <td class="mono" style="color:var(--clr-primary)">${myRankEntry.score.toLocaleString()}</td>
        <td class="mono">${(myRankEntry.solves || []).length}</td>
        <td class="mono">${formatDate(myRankEntry.lastSolveAt)}</td>
        <td class="mono">🔥 ${myRankEntry.streak || 0}</td>
      </tr>`;
  }

  tbody.innerHTML = tableRows;

  setupLogoutConfirmation(document.getElementById("btn-logout"), logout);
</script>
</body>
</html>
