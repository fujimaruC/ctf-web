<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlagForge — Forgot Password</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo"><a href="index.html" class="nav-logo"><div class="logo-mark">⚑</div> FlagForge</a></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">Home</a>
        <a href="login.html" class="nav-item">Sign In</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header"><h1>Forgot Password</h1></div>
      <div class="page-body card">
        <p>Reset your password by entering your account email below.</p>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="reset-email" class="form-input" type="email" placeholder="you@example.com" />
        </div>
        <button class="btn btn-primary" onclick="sendResetEmail()">Send reset link</button>
        <p style="margin-top:16px;">Back to <a href="login.html">Sign In</a></p>
      </div>
    </main>
  </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
  function sendResetEmail() {
    const email = document.getElementById('reset-email').value.trim();
    if (!email) { alert('Please enter your email.'); return; }
    firebase.auth().sendPasswordResetEmail(email)
      .then(() => alert('Reset link sent. Check your inbox.'))
      .catch(e => alert(e.message || 'Failed to send reset link.'));
  }
</script>
</body>
</html>
